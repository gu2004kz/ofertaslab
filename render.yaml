services:
  - type: web
    name: ofertaslab
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npx puppeteer browsers install chrome
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ofertaslab-db
          property: connectionString
      - key: BASE_URL
        value: https://ofertaslab.onrender.com
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: true
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/google-chrome-stable
    disk:
      name: data
      mountPath: /opt/render/project/src
      sizeGB: 1

databases:
  - name: ofertaslab-db
    plan: free
    databaseName: ofertaslab
