services:
  - type: web
    name: ofertaslab
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ofertaslab-db
          property: connectionString
      - key: BASE_URL
        value: https://ofertaslab.onrender.com

databases:
  - name: ofertaslab-db
    plan: free
    databaseName: ofertaslab
