<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OFERTASLAB - Melhores Ofertas de Shopee e Mercado Livre</title>
  <meta name="description" content="As melhores ofertas com desconto de até 90% na Shopee e Mercado Livre. Promoções atualizadas automaticamente a cada minuto.">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0a0f">
  <style>
    .public-header { text-align: center; padding: 40px 20px 20px; }
    .public-header h1 { font-size: 32px; font-weight: 700; background: var(--gradient-primary); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
    .public-header p { color: var(--text-secondary); font-size: 16px; }
    .offers-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; padding: 20px; max-width: 1200px; margin: 0 auto; }
    .offer-card { background: var(--bg-glass); border: 1px solid var(--border-glass); border-radius: var(--radius); overflow: hidden; transition: var(--transition); }
    .offer-card:hover { transform: translateY(-4px); border-color: var(--accent); box-shadow: 0 8px 30px var(--accent-glow); }
    .offer-img { width: 100%; height: 200px; object-fit: cover; background: var(--bg-tertiary); }
    .offer-body { padding: 16px; }
    .offer-title { font-size: 14px; font-weight: 500; margin-bottom: 8px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .offer-prices { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .offer-old { text-decoration: line-through; color: var(--text-muted); font-size: 13px; }
    .offer-new { color: var(--success); font-weight: 700; font-size: 18px; }
    .offer-discount { background: rgba(16,185,129,0.15); color: var(--success); padding: 2px 8px; border-radius: 12px; font-size: 12px; font-weight: 600; }
    .offer-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--text-muted); }
    .offer-buy { display: block; text-align: center; padding: 10px; background: var(--gradient-primary); color: white; text-decoration: none; border-radius: var(--radius-sm); font-weight: 600; margin-top: 12px; transition: var(--transition); }
    .offer-buy:hover { transform: translateY(-1px); box-shadow: 0 4px 15px var(--accent-glow); }
    .stats-bar { display: flex; justify-content: center; gap: 32px; padding: 16px; margin-bottom: 10px; }
    .stat-item { text-align: center; }
    .stat-num { font-size: 24px; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 12px; color: var(--text-muted); }
    .filter-bar { display: flex; justify-content: center; gap: 8px; padding: 0 20px 20px; flex-wrap: wrap; }
    .filter-btn { padding: 6px 16px; border-radius: 20px; background: var(--bg-glass); border: 1px solid var(--border-glass); color: var(--text-secondary); cursor: pointer; font-size: 13px; transition: var(--transition); }
    .filter-btn:hover, .filter-btn.active { background: var(--accent-glow); color: var(--accent); border-color: var(--accent); }
    .footer { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 12px; }
  </style>
</head>
<body>
  <div class="public-header">
    <h1>OFERTASLAB</h1>
    <p>As melhores ofertas com desconto, atualizadas automaticamente</p>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-item"><div class="stat-num" id="totalOfertas">-</div><div class="stat-label">Ofertas Ativas</div></div>
    <div class="stat-item"><div class="stat-num" id="totalLojas">-</div><div class="stat-label">Lojas</div></div>
    <div class="stat-item"><div class="stat-num">24h</div><div class="stat-label">Atualizado</div></div>
  </div>

  <div class="filter-bar" id="filterBar"></div>
  <div class="offers-grid" id="offersGrid">
    <div class="loading" style="grid-column:1/-1;"><div class="spinner"></div></div>
  </div>

  <div class="footer">
    <p>OFERTASLAB - Ofertas automatizadas da Shopee e Mercado Livre</p>
  </div>

  <script>
    let allOffers = [];
    let activeFilter = '';

    function formatCurrency(v) {
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v || 0);
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    async function loadOffers() {
      try {
        const res = await fetch('/api/public/ofertas');
        allOffers = await res.json();
        renderFilters();
        renderOffers();
        const stats = await fetch('/api/public/stats');
        const s = await stats.json();
        document.getElementById('totalOfertas').textContent = s.ofertas || 0;
        document.getElementById('totalLojas').textContent = s.lojas || 0;
      } catch (e) {
        document.getElementById('offersGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="icon">📭</div><h3>Nenhuma oferta disponível no momento</h3></div>';
      }
    }

    function renderFilters() {
      const cats = [...new Set(allOffers.map(o => o.categoria).filter(Boolean))];
      const bar = document.getElementById('filterBar');
      bar.innerHTML = '<button class="filter-btn active" onclick="setFilter(\'\')">Todas</button>' +
        cats.map(c => `<button class="filter-btn" onclick="setFilter('${escapeHtml(c)}')">${escapeHtml(c)}</button>`).join('');
    }

    function setFilter(f) {
      activeFilter = f;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', (f === '' && b.textContent === 'Todas') || b.textContent === f));
      renderOffers();
    }

    function renderOffers() {
      const grid = document.getElementById('offersGrid');
      const filtered = activeFilter ? allOffers.filter(o => o.categoria === activeFilter) : allOffers;

      if (!filtered.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="icon">🔍</div><h3>Nenhuma oferta encontrada</h3></div>';
        return;
      }

      grid.innerHTML = filtered.map(o => `
        <div class="offer-card">
          ${o.imagem ? `<img class="offer-img" src="${escapeHtml(o.imagem)}" alt="${escapeHtml(o.produto)}" loading="lazy" onerror="this.style.display='none'">` : '<div class="offer-img" style="display:flex;align-items:center;justify-content:center;font-size:48px">🛒</div>'}
          <div class="offer-body">
            <div class="offer-title">${escapeHtml(o.produto)}</div>
            <div class="offer-prices">
              ${o.preco_antigo ? `<span class="offer-old">${formatCurrency(o.preco_antigo)}</span>` : ''}
              <span class="offer-new">${formatCurrency(o.preco_novo)}</span>
              ${o.desconto > 0 ? `<span class="offer-discount">-${o.desconto}%</span>` : ''}
            </div>
            <div class="offer-meta">
              <span class="tag">${o.plataforma === 'shopee' ? 'Shopee' : 'Mercado Livre'}</span>
              ${o.loja ? `<span>${escapeHtml(o.loja)}</span>` : ''}
            </div>
            <a href="https://ofertaslab.onrender.com/go/${o.id}" class="offer-buy" target="_blank">Ver Oferta</a>
          </div>
        </div>
      `).join('');
    }

    loadOffers();
    setInterval(loadOffers, 300000);
  </script>
</body>
</html>
