[build]
  publish = "frontend"
  command = "echo 'Static site - no build needed'"

[[redirects]]
  from = "/api/*"
  to = "https://ofertaslab.onrender.com/api/*"
  status = 200
  force = true

[[redirects]]
  from = "/go/*"
  to = "https://ofertaslab.onrender.com/go/*"
  status = 302
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
